# -- Global settings --
namespace: aml

# -- API --
api:
  replicaCount: 2
  image:
    repository: ghcr.io/adorsys-gis/fineract-aml-api
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- Celery Worker --
worker:
  replicaCount: 2
  concurrency: 4
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Celery Beat --
beat:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Dashboard --
dashboard:
  replicaCount: 1
  image:
    repository: ghcr.io/adorsys-gis/fineract-aml-dashboard
    tag: latest
    pullPolicy: IfNotPresent
  port: 80

# -- PostgreSQL --
postgresql:
  enabled: true
  image: postgres:16-alpine
  auth:
    username: aml
    password: ""  # Set via --set or secrets
    database: fineract_aml
  storage:
    size: 20Gi
  backup:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM
    retentionDays: 30

# -- Redis --
redis:
  enabled: true
  image: redis:7-alpine
  storage:
    size: 2Gi

# -- MLflow --
mlflow:
  enabled: true
  image: ghcr.io/mlflow/mlflow:v2.16.2
  port: 5000
  storage:
    size: 10Gi

# -- Ingress --
ingress:
  enabled: false
  className: nginx
  hosts:
    - host: aml.example.com
      paths:
        - path: /api
          service: api
        - path: /
          service: dashboard
  tls: []

# -- AML Configuration --
config:
  debug: "false"
  apiPrefix: /api/v1
  defaultCurrency: XAF
  # Risk thresholds
  riskScoreHigh: "0.8"
  riskScoreMedium: "0.5"
  anomalyContamination: "0.01"
  # Rule engine
  maxTransactionAmount: "10000.0"
  structuringThreshold: "9500.0"
  rapidTransactionCount: "10"
  rapidTransactionWindowMinutes: "60"
  # CTR threshold (XAF)
  ctrThreshold: "5000000.0"
  # Sanctions
  sanctionsScreeningEnabled: "true"
  sanctionsMatchThreshold: "0.85"
  # CORS
  corsOrigins: "https://aml.example.com"
  # Auth
  accessTokenExpireMinutes: "30"

# -- Secrets (override via --set or external secret manager) --
secrets:
  secretKey: ""         # JWT signing key — MUST override
  webhookSecret: ""     # Fineract HMAC secret — MUST override
  dbPassword: ""        # PostgreSQL password — MUST override
