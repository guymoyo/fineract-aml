apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aml.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.secrets.secretKey | required "secrets.secretKey is required" | quote }}
  webhook-secret: {{ .Values.secrets.webhookSecret | required "secrets.webhookSecret is required" | quote }}
  db-password: {{ .Values.secrets.dbPassword | required "secrets.dbPassword is required" | quote }}
