apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-redis
  namespace: aml
  labels:
    app: aml-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aml-redis
  template:
    metadata:
      labels:
        app: aml-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aml-redis
  namespace: aml
spec:
  selector:
    app: aml-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
