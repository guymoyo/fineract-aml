apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-postgres
  namespace: aml
  labels:
    app: aml-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aml-postgres
  template:
    metadata:
      labels:
        app: aml-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: fineract_aml
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "aml", "-d", "fineract_aml"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: aml-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aml-postgres
  namespace: aml
spec:
  selector:
    app: aml-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aml-postgres-pvc
  namespace: aml
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aml-model-pvc
  namespace: aml
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
