apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-api
  namespace: aml
  labels:
    app: aml-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aml-api
  template:
    metadata:
      labels:
        app: aml-api
    spec:
      containers:
        - name: aml-api
          image: ghcr.io/adorsys-gis/fineract-aml-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: AML_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: database-url
            - name: AML_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: redis-url
            - name: AML_CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: celery-broker-url
            - name: AML_FINERACT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: webhook-secret
            - name: AML_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: aml-model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aml-api
  namespace: aml
spec:
  selector:
    app: aml-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
